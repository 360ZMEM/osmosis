env:
  tune_gains: true
  identity_init: false
  enable_pe: true
  enable_deadzone: true
  enable_param_lpf: true
  # === SO(3) 流形 S 面（Phase 1 eval, ordinary medium 回归）===
  # 与 pressure_flip360_medium_so3.yaml 同一控制律参数；仅参考轨迹换成普通 sine_sweep。
  attitude_error_mode: so3
  action_lim_vec: [0.6, 0.6, 0.3, 1.0]
  geo_zeta1: 1.0
  geo_zeta2: 0.5
  geo_residual_scale: 0.5
  reference_mode: sine_sweep
  ref_sine_amp: [0.35, 0.35, 0.35]
  ref_sine_freq: [0.18, 0.22, 0.15]
  disturbance_cfg:
    mode: jonswap
    base_vel: [0.08, 0.0, 0.03]
    jonswap_hs: 0.8
    jonswap_fp: 0.14
    jonswap_gamma: 3.3
    jonswap_depth: 30.0
    jonswap_direction: 0.0
    jonswap_seed: 11
