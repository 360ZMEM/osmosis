env:
  tune_gains: true
  identity_init: false
  enable_pe: true
  enable_deadzone: true
  enable_param_lpf: true
  # === 纯解析 SO(3) 姿态基线（诊断用，res=0，ordinary 回归）===
  attitude_error_mode: so3
  action_lim_vec: [0.6, 0.6, 0.3, 1.0]
  geo_zeta1: 1.0
  geo_zeta2: 0.5
  geo_residual_scale: 0.0
  reference_mode: sine_sweep
  ref_sine_amp: [0.35, 0.35, 0.35]
  ref_sine_freq: [0.18, 0.22, 0.15]
  disturbance_cfg:
    mode: jonswap
    base_vel: [0.08, 0.0, 0.03]
    jonswap_hs: 0.8
    jonswap_fp: 0.14
    jonswap_gamma: 3.3
    jonswap_depth: 30.0
    jonswap_direction: 0.0
    jonswap_seed: 11
